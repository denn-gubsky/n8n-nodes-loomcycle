# Publish workflow — fires on v*.*.* tags + manual dispatch.
# Uses npm provenance to attest the package was built from this repo.
# No untrusted-input substitutions (issue titles, PR bodies, commit
# messages); only the safe github.ref (tag name) flows via the trigger.
name: publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only (default true when manually dispatched)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      # npm install (not ci): @n8n/ai-node-sdk's tree (@langchain/community →
      # ignore@7 vs eslint's ignore@5) is not npm-ci-consistent. The lockfile
      # isn't published (files: ["dist"]), so this is build-time only.
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - name: Publish (tag push = real publish; workflow_dispatch defaults to dry-run)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry-run publish (no actual upload)"
            npm publish --dry-run --access public
          else
            echo "Real publish with provenance"
            npm publish --provenance --access public
          fi
