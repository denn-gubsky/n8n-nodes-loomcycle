# Publish workflow (full-edition branch) — fires on full-v*.*.* tags.
# Publishes @loomcycle/n8n-nodes-loomcycle-full (the self-hosted superset).
# Distinct tag prefix from main's `v*.*.*` so the two packages publish
# independently from the same repo. Uses npm provenance.
# No untrusted-input substitutions; only the safe github.ref (tag name).
name: publish-full

on:
  push:
    tags:
      - 'full-v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only (default true when manually dispatched)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - name: Publish (tag push = real publish; workflow_dispatch defaults to dry-run)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry-run publish (no actual upload)"
            npm publish --dry-run --access public
          else
            echo "Real publish with provenance"
            npm publish --provenance --access public
          fi
