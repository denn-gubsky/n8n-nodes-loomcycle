# CI workflow — uses only the matrix variable ${{ matrix.node-version }}.
# No untrusted-input substitutions (issue/PR titles, commit messages, etc).
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  # n8n's official community-node conformance linter — the gate n8n runs when
  # vetting a verification submission. Keeping it green here keeps the package
  # submission-ready on every push.
  conformance:
    name: n8n-node lint (verification conformance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      # n8n's official conformance linter, run the as-designed way via npx so
      # the CLI's bundled eslint + flat config resolve correctly. Node 22 is
      # required by its isolated-vm dependency, which compiles cleanly there
      # (ubuntu runners ship the gyp toolchain). Pinned for reproducible
      # conformance results; bump deliberately when adopting new rule sets.
      - run: npx --yes @n8n/node-cli@0.32.1 lint
